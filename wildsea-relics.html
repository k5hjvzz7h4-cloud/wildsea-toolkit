    {

    {
      name: "Self-Winding Escapement",
      appearance: "A compact assembly of lever, pallet, and escape wheel, mounted in a brass frame small enough to hold in one hand, every surface ground to a finish that catches light cleanly",

// ── HELPERS ───────────────────────────────────────────────────────────────────
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentCat = "any";
let currentRelic = null;

// ── FILTERS ───────────────────────────────────────────────────────────────────
document.querySelectorAll(".f-btn[data-filter='cat']").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".f-btn[data-filter='cat']").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentCat = btn.dataset.val;
  });
});

// ── GENERATION ────────────────────────────────────────────────────────────────
function generateRelic() {
  const catKey = currentCat === "any" ? pick(Object.keys(CATEGORIES)) : currentCat;
  const cat = CATEGORIES[catKey];
  const item = pick(cat.items);
  const condition = pick(CONDITIONS);
  const origin = pick(ORIGINS);
  const complication = pick(COMPLICATIONS);
  const currentUse = pick(CURRENT_USES);
  currentRelic = { catKey, cat, item, condition, origin, complication, currentUse };
  render();
}

function reroll(field) {
  if (!currentRelic) return;
  const r = currentRelic;
  if (field === "item")        r.item       = pick(r.cat.items);
  else if (field === "condition")  r.condition  = pick(CONDITIONS);
  else if (field === "origin")     r.origin     = pick(ORIGINS);
  else if (field === "complication") r.complication = pick(COMPLICATIONS);
  else if (field === "use")        r.currentUse = pick(CURRENT_USES);
  render();
}

function render() {
  const r = currentRelic;
  const card = document.getElementById("card");
  card.className = "relic-card populated";
  card.innerHTML = `
    <div class="card-header">
      <div class="card-name">${r.item.name}</div>
      <div class="card-type-row">
        <span class="badge cat-${r.catKey}">${r.cat.label}</span>
        <span class="badge cond">${r.condition.label}</span>
      </div>
      <div class="card-reroll-header">
        <div class="card-appearance">${r.item.appearance}</div>
        <button class="reroll-btn" onclick="reroll('item')" style="margin-top:2px">Reroll</button>
      </div>
    </div>

    <div class="card-section">
      <div class="section-header">
        <span class="section-title">Function</span>
      </div>
      <div class="section-text">${r.item.function}</div>
    </div>

    <div class="card-section">
      <div class="section-header">
        <span class="section-title">Condition</span>
        <button class="reroll-btn" onclick="reroll('condition')">Reroll</button>
      </div>
      <div class="section-text">${r.condition.desc}</div>
